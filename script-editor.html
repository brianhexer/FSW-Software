<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Script Writer - Professional Screenwriting Tool</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.14);
            --glass-bg-strong: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.26);
            --glass-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
            --ink: #e0f2fe;
            --ink-muted: rgba(224, 242, 254, 0.72);
            --accent: #7dd3fc;
            --accent-strong: #38bdf8;
        }

        html, body {
            min-height: 100%;
            background:
                radial-gradient(circle at 18% 18%, rgba(56, 189, 248, 0.34), transparent 24%),
                radial-gradient(circle at 82% 14%, rgba(125, 211, 252, 0.18), transparent 22%),
                radial-gradient(circle at 50% 86%, rgba(99, 102, 241, 0.22), transparent 28%),
                linear-gradient(135deg, #06101d 0%, #10233f 48%, #081120 100%);
            color: var(--ink);
        }

        body {
            overflow: hidden;
        }

        #root {
            min-height: 100vh;
        }

        .glass-shell {
            position: relative;
            min-height: 100vh;
            backdrop-filter: blur(18px) saturate(1.2);
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(22px) saturate(1.25);
        }

        .glass-panel-strong {
            background: var(--glass-bg-strong);
            border: 1px solid rgba(255, 255, 255, 0.34);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(26px) saturate(1.35);
        }

        .glass-sheen {
            position: relative;
            overflow: hidden;
        }

        .glass-sheen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.22), transparent 36%, rgba(255, 255, 255, 0.08) 70%, transparent);
            pointer-events: none;
        }
        
        * {
            font-family: 'Courier Prime', monospace;
        }
        
        .script-editor {
            font-family: 'Courier Prime', monospace;
            font-size: 12pt;
            line-height: 1.5;
            background: transparent;
        }
        
        .script-line {
            position: relative;
            min-height: 1.5em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .line-number {
            display: inline-block;
            width: 40px;
            text-align: right;
            color: #999;
            margin-right: 20px;
            user-select: none;
            padding-right: 10px;
        }
        
        .format-indicator {
            position: absolute;
            left: 5px;
            color: #0066cc;
            font-size: 9px;
            opacity: 0.6;
        }
        
        .scene-heading {
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        
        .action {
            margin-bottom: 0.5em;
        }
        
        .character {
            text-transform: uppercase;
            margin-top: 0.5em;
            margin-bottom: 0;
            font-weight: bold;
        }
        
        .parenthetical {
            margin-left: 2.5cm;
            margin-bottom: 0;
        }
        
        .dialogue {
            margin-left: 1.8cm;
            margin-bottom: 0;
        }
        
        .transition {
            text-align: right;
            text-transform: uppercase;
            margin-top: 0.5em;
            font-weight: bold;
        }
        
        .editor-textarea {
            font-family: 'Courier Prime', monospace;
            font-size: 12pt;
            line-height: 1.5;
            resize: none;
            background: rgba(255, 255, 255, 0.11);
            border: none;
            border-radius: 28px;
            padding: 28px 28px 40px;
            color: #f8fafc;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
            caret-color: var(--accent);
        }
        
        .editor-textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.16);
        }
        
        .sidebar {
            background: rgba(8, 15, 28, 0.36);
            color: var(--ink);
            overflow-y: auto;
            max-height: 100vh;
            backdrop-filter: blur(24px) saturate(1.25);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
        }
        
        .scene-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .scene-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-left-color: var(--accent);
        }
        
        .scene-item.active {
            background: rgba(125, 211, 252, 0.16);
            border-left-color: #fbbf24;
        }
        
        .character-suggestion {
            padding: 8px 12px;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.06);
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            transition: background 0.2s;
        }
        
        .character-suggestion:hover {
            background: rgba(56, 189, 248, 0.14);
        }

        .automation-panel {
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
            backdrop-filter: blur(20px) saturate(1.25);
        }

        .automation-panel-title {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.78);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .automation-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .automation-action {
            padding: 8px 10px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.12);
            color: #f8fafc;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .automation-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            color: #f8fafc;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
            backdrop-filter: blur(10px);
        }

        .automation-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);
            background: linear-gradient(180deg, rgba(56,189,248,0.08), rgba(59,130,246,0.04));
        }
        
        .format-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .format-badge.scene {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .format-badge.action {
            background: #fecaca;
            color: #991b1b;
        }
        
        .format-badge.character {
            background: #d1fae5;
            color: #065f46;
        }
        
        .format-badge.dialogue {
            background: #fcd34d;
            color: #78350f;
        }
        
        .format-badge.parenthetical {
            background: #e9d5ff;
            color: #581c87;
        }
        
        .stats-bar {
            background: rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding: 12px 20px;
            font-size: 11px;
            color: var(--ink-muted);
        }
        
        .button-base {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.14s ease;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px) saturate(1.2);
        }
        
        .button-primary {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.96), rgba(59, 130, 246, 0.92));
            color: white;
        }
        
        .button-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 44px rgba(56, 189, 248, 0.22);
        }
        
        .button-secondary {
            background: rgba(255, 255, 255, 0.12);
            color: #f8fafc;
        }
        
        .button-secondary:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-2px);
        }
        
        .button-danger {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.9), rgba(239, 68, 68, 0.9));
            color: white;
        }
        
        .button-danger:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 44px rgba(239, 68, 68, 0.18);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.58);
            color: #f8fafc;
            padding: 12px 20px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(16px) saturate(1.2);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(3, 7, 18, 0.48);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(14px);
        }
        
        .modal {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(20px) saturate(1.3);
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #f8fafc;
        }
        
        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 14px;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: rgba(125, 211, 252, 0.65);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
        }
        
        .pdf-page {
            width: 8.5in;
            min-height: 11in;
            padding: 1in;
            background: white;
            margin: 0 auto;
            font-family: 'Courier Prime', monospace;
            font-size: 12pt;
            line-height: 1.5;
            page-break-after: always;
            color: #111827;
        }

        .pdf-page * {
            margin: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================================================
        // SCRIPT FORMATTING UTILITIES
        // ============================================================================

        const FORMAT_TYPES = {
            SCENE_HEADING: 'scene-heading',
            ACTION: 'action',
            CHARACTER: 'character',
            PARENTHETICAL: 'parenthetical',
            DIALOGUE: 'dialogue',
            TRANSITION: 'transition',
        };

        const detectFormat = (text, previousFormat) => {
            if (!text.trim()) return FORMAT_TYPES.ACTION;
            
            const trimmed = text.trim().toUpperCase();
            
            // Scene Heading detection
            if (
                trimmed.match(/^(INT\.|EXT\.|INT\/EXT\.|I\/E\.)/) ||
                trimmed.match(/^(INT|EXT|INT\/EXT|I\/E) /) ||
                (previousFormat !== FORMAT_TYPES.DIALOGUE && trimmed.match(/^\w+\s*[-–]\s*(DAY|NIGHT|DAWN|DUSK|CONTINUOUS|MORNING|AFTERNOON|EVENING)/i))
            ) {
                return FORMAT_TYPES.SCENE_HEADING;
            }
            
            // Transition detection (ends with TO:)
            if (trimmed.endsWith('TO:')) {
                return FORMAT_TYPES.TRANSITION;
            }
            
            // Parenthetical detection (surrounded by parentheses)
            if (trimmed.startsWith('(') && trimmed.endsWith(')')) {
                return FORMAT_TYPES.PARENTHETICAL;
            }
            
            // After dialogue, next non-empty should be character or action
            if (previousFormat === FORMAT_TYPES.DIALOGUE) {
                // If all caps and relatively short, likely character
                if (text === text.toUpperCase() && text.length > 0 && text.length < 40) {
                    return FORMAT_TYPES.CHARACTER;
                }
                return FORMAT_TYPES.ACTION;
            }
            
            // After character, should be dialogue or parenthetical
            if (previousFormat === FORMAT_TYPES.CHARACTER) {
                if (trimmed.startsWith('(') && trimmed.endsWith(')')) {
                    return FORMAT_TYPES.PARENTHETICAL;
                }
                return FORMAT_TYPES.DIALOGUE;
            }
            
            // After parenthetical, should be dialogue
            if (previousFormat === FORMAT_TYPES.PARENTHETICAL) {
                return FORMAT_TYPES.DIALOGUE;
            }
            
            // All caps and short = likely character
            if (text === text.toUpperCase() && text.length > 0 && text.length < 40 && text.trim().match(/^[A-Z\s\-]+$/)) {
                return FORMAT_TYPES.CHARACTER;
            }
            
            return FORMAT_TYPES.ACTION;
        };

        const applyFormatting = (text, format) => {
            switch (format) {
                case FORMAT_TYPES.SCENE_HEADING:
                    return text.toUpperCase();
                case FORMAT_TYPES.CHARACTER:
                    return text.toUpperCase().trim();
                case FORMAT_TYPES.ACTION:
                case FORMAT_TYPES.DIALOGUE:
                case FORMAT_TYPES.PARENTHETICAL:
                case FORMAT_TYPES.TRANSITION:
                default:
                    return text;
            }
        };

        const getIndentation = (format) => {
            switch (format) {
                case FORMAT_TYPES.SCENE_HEADING:
                    return 0;
                case FORMAT_TYPES.ACTION:
                    return 0;
                case FORMAT_TYPES.CHARACTER:
                    return 3.7; // inches
                case FORMAT_TYPES.DIALOGUE:
                    return 1.5; // inches
                case FORMAT_TYPES.PARENTHETICAL:
                    return 2.2; // inches
                case FORMAT_TYPES.TRANSITION:
                    return 0;
                default:
                    return 0;
            }
        };

        // ============================================================================
        // SCRIPT PARSER & ANALYZER
        // ============================================================================

        const parseScript = (text) => {
            const lines = text.split('\n');
            const parsed = [];
            let previousFormat = FORMAT_TYPES.ACTION;

            lines.forEach((line, index) => {
                const format = detectFormat(line, previousFormat);
                const formatted = applyFormatting(line, format);
                
                parsed.push({
                    index,
                    original: line,
                    formatted,
                    format,
                    characters: extractCharactersFromLine(line, format),
                });

                if (format !== FORMAT_TYPES.DIALOGUE && format !== FORMAT_TYPES.PARENTHETICAL) {
                    previousFormat = format;
                }
            });

            return parsed;
        };

        const extractCharactersFromLine = (line, format) => {
            if (format === FORMAT_TYPES.CHARACTER) {
                return [line.trim()];
            }
            return [];
        };

        const extractScenes = (parsed) => {
            return parsed
                .filter(line => line.format === FORMAT_TYPES.SCENE_HEADING)
                .map((line, idx) => ({
                    index: line.index,
                    heading: line.formatted,
                    lineNumber: idx + 1,
                }));
        };

        const extractCharacters = (parsed) => {
            const seen = new Set();
            const characters = [];
            parsed.forEach(line => {
                if (line.format === FORMAT_TYPES.CHARACTER) {
                    const char = line.formatted;
                    if (!seen.has(char)) {
                        seen.add(char);
                        characters.push(char);
                    }
                }
            });
            return characters;
        };

        const getScriptStats = (parsed) => {
            return {
                pages: Math.ceil((parsed.length * 12) / 55), // Rough estimate
                lines: parsed.length,
                scenes: parsed.filter(l => l.format === FORMAT_TYPES.SCENE_HEADING).length,
                characters: new Set(
                    parsed.filter(l => l.format === FORMAT_TYPES.CHARACTER).map(l => l.formatted)
                ).size,
            };
        };

        // ============================================================================
        // SCENE NAVIGATOR COMPONENT
        // ============================================================================

        const SceneNavigator = ({ scenes, onSceneClick, currentLineIndex }) => {
            return (
                <div className="sidebar glass-panel w-64 flex flex-col">
                    <div className="p-4 border-b border-white/10">
                        <h2 className="text-sm font-bold uppercase tracking-wide">Scenes</h2>
                    </div>
                    <div className="flex-1 overflow-y-auto">
                        {scenes.length === 0 ? (
                            <div className="p-4 text-xs text-gray-500">No scenes yet</div>
                        ) : (
                            scenes.map((scene) => (
                                <div
                                    key={scene.index}
                                    className={`scene-item text-xs ${
                                        currentLineIndex >= scene.index ? 'active' : ''
                                    }`}
                                    onClick={() => onSceneClick(scene.index)}
                                >
                                    <span className="font-bold text-yellow-400 mr-2">
                                        #{scene.lineNumber}
                                    </span>
                                    <span className="truncate">{scene.heading}</span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================================
        // CHARACTER SUGGESTIONS DROPDOWN
        // ============================================================================

        const CharacterSuggestions = ({ characters, filter, onSelect, visible }) => {
            if (!visible || !filter.trim()) return null;

            const filtered = characters.filter(char =>
                char.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) return null;

            return filtered.slice(0, 5).map(char => (
                <div
                    key={char}
                    className="character-suggestion"
                    onClick={() => onSelect(char)}
                >
                    {char}
                </div>
            ));
        };

        // ============================================================================
        // MAIN SCRIPT EDITOR COMPONENT
        // ============================================================================

        const ScriptEditor = () => {
            const [scriptContent, setScriptContent] = useState('');
            const [title, setTitle] = useState('Untitled Script');
            const [isDirty, setIsDirty] = useState(false);
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [toast, setToast] = useState(null);
            const [selectedFormat, setSelectedFormat] = useState(FORMAT_TYPES.ACTION);
            const [showCharacterSuggestions, setShowCharacterSuggestions] = useState(false);
            const [characterDraft, setCharacterDraft] = useState('');
            const [activeSuggestionIndex, setActiveSuggestionIndex] = useState(0);
            const editorRef = useRef(null);
            const cursorPositionRef = useRef(0);

            // Parse script data
            const parsed = parseScript(scriptContent);
            const scenes = extractScenes(parsed);
            const rawCharacters = extractCharacters(parsed);
            const trailingLine = scriptContent.split('\n').pop().trim();
            const characters = scriptContent.endsWith('\n') || !trailingLine
                ? rawCharacters
                : rawCharacters.filter((character) => character !== trailingLine.toUpperCase());
            const stats = getScriptStats(parsed);

            const getCurrentLineContext = (text) => {
                const currentLine = text.split('\n').pop() || '';
                return {
                    currentLine,
                    currentFormat: detectFormat(currentLine, selectedFormat),
                };
            };

            const currentLineContext = getCurrentLineContext(scriptContent);
            const currentCharacterDraft = currentLineContext.currentFormat === FORMAT_TYPES.CHARACTER
                ? currentLineContext.currentLine.trim()
                : '';
            const characterSuggestions = characters.length > 0 && currentCharacterDraft
                ? characters.filter((character) =>
                    character.toLowerCase().includes(currentCharacterDraft.toLowerCase())
                )
                : characters;
            const showCharacterSuggestionsPanel = showCharacterSuggestions && characters.length > 0;

            // ================================================================
            // STORAGE & PERSISTENCE
            // ================================================================

            useEffect(() => {
                const saved = localStorage.getItem('filmScriptData');
                if (saved) {
                    try {
                        const { content, title: savedTitle } = JSON.parse(saved);
                        setScriptContent(content);
                        setTitle(savedTitle);
                    } catch (e) {
                        console.error('Failed to load saved script:', e);
                    }
                }
            }, []);

            useEffect(() => {
                if (isDirty) {
                    const timer = setTimeout(() => {
                        localStorage.setItem(
                            'filmScriptData',
                            JSON.stringify({ content: scriptContent, title })
                        );
                        showToast('Script auto-saved');
                        setIsDirty(false);
                    }, 2000);

                    return () => clearTimeout(timer);
                }
            }, [scriptContent, title, isDirty]);

            useEffect(() => {
                if (!showCharacterSuggestionsPanel || characterSuggestions.length === 0) {
                    setActiveSuggestionIndex(0);
                    return;
                }

                if (activeSuggestionIndex >= characterSuggestions.length) {
                    setActiveSuggestionIndex(0);
                }
            }, [showCharacterSuggestionsPanel, activeSuggestionIndex, characterSuggestions.length]);

            const updateAutomationState = (text, cursorPos) => {
                const beforeCursor = text.substring(0, cursorPos);
                const currentLine = beforeCursor.split('\n').pop() || '';
                const currentFormat = detectFormat(currentLine, selectedFormat);

                if (currentFormat === FORMAT_TYPES.CHARACTER && currentLine.trim()) {
                    setCharacterDraft(currentLine.trim());
                    setShowCharacterSuggestions(characters.length > 0);
                } else {
                    setCharacterDraft('');
                    setShowCharacterSuggestions(false);
                    setActiveSuggestionIndex(0);
                }

                return { currentLine, currentFormat };
            };

            const selectCharacterSuggestion = (character) => {
                const editor = editorRef.current;
                if (!editor) return;

                const text = editor.value || '';
                const insertValue = character.toUpperCase();

                // Determine the line at the current cursor position and replace it.
                const cursorPos = editor.selectionStart || text.length;
                const lineStart = text.lastIndexOf('\n', Math.max(0, cursorPos - 1)) + 1;
                const nextNewline = text.indexOf('\n', cursorPos);
                const lineEnd = nextNewline === -1 ? text.length : nextNewline;

                const before = text.substring(0, lineStart);
                const after = text.substring(lineEnd);

                const newContent = before + insertValue + after;

                // Apply changes and place caret after the inserted character name
                editor.value = newContent;
                const caretPos = before.length + insertValue.length;
                editor.selectionStart = editor.selectionEnd = caretPos;

                setScriptContent(newContent);
                setIsDirty(true);
                setSelectedFormat(FORMAT_TYPES.CHARACTER);
                setCharacterDraft(insertValue);
                setShowCharacterSuggestions(false);
                setActiveSuggestionIndex(0);
            };

            const autoFormatScript = (sourceText) => {
                const lines = sourceText.replace(/\r\n/g, '\n').split('\n');
                const normalized = [];
                let previousFormat = FORMAT_TYPES.ACTION;
                let lastLineWasBlank = false;

                lines.forEach((line) => {
                    const trimmedRight = line.replace(/[\t ]+$/g, '');
                    const trimmed = trimmedRight.trim();

                    if (!trimmed) {
                        if (!lastLineWasBlank) {
                            normalized.push('');
                        }
                        lastLineWasBlank = true;
                        return;
                    }

                    lastLineWasBlank = false;
                    const format = detectFormat(trimmedRight, previousFormat);
                    const formatted = applyFormatting(trimmed, format);
                    normalized.push(formatted);

                    if (format !== FORMAT_TYPES.DIALOGUE && format !== FORMAT_TYPES.PARENTHETICAL) {
                        previousFormat = format;
                    }
                });

                return normalized.join('\n').replace(/\n{3,}/g, '\n\n');
            };

            // ================================================================
            // KEYBOARD SHORTCUTS & SMART FORMATTING
            // ================================================================

            const handleKeyDown = (e) => {
                const editor = editorRef.current;
                if (!editor) return;

                const cursorPos = editor.selectionStart;
                const text = editor.value;
                const textBeforeCursor = text.substring(0, cursorPos);
                const lines = textBeforeCursor.split('\n');
                const currentLineIndex = lines.length - 1;
                const currentLine = lines[currentLineIndex];
                const currentLineStart = textBeforeCursor.length - currentLine.length;

                if (showCharacterSuggestionsPanel && characterSuggestions.length > 0) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        setActiveSuggestionIndex((index) => (index + 1) % characterSuggestions.length);
                        return;
                    }

                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        setActiveSuggestionIndex((index) =>
                            (index - 1 + characterSuggestions.length) % characterSuggestions.length
                        );
                        return;
                    }

                    if (e.key === 'Escape') {
                        e.preventDefault();
                        setShowCharacterSuggestions(false);
                        setCharacterDraft('');
                        return;
                    }

                    if (e.key === 'Tab' || e.key === 'Enter') {
                        e.preventDefault();
                        selectCharacterSuggestion(characterSuggestions[activeSuggestionIndex]);
                        return;
                    }
                }

                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'f') {
                    e.preventDefault();
                    const nextContent = autoFormatScript(text);
                    editor.value = nextContent;
                    editor.selectionStart = editor.selectionEnd = Math.min(cursorPos, nextContent.length);
                    setScriptContent(nextContent);
                    setIsDirty(true);
                    showToast('Script auto-formatted');
                    return;
                }

                // TAB: Insert smart indentation or next element
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const format = detectFormat(currentLine, selectedFormat);
                    
                    if (format === FORMAT_TYPES.CHARACTER) {
                        // After character, go to parenthetical or dialogue
                        const newFormat = FORMAT_TYPES.DIALOGUE;
                        const indent = ' '.repeat(Math.ceil(getIndentation(newFormat) * 4));
                        editor.value = 
                            text.substring(0, cursorPos) + 
                            indent + 
                            text.substring(cursorPos);
                        editor.selectionStart = editor.selectionEnd = cursorPos + indent.length;
                    } else {
                        // Normal tab behavior
                        const indent = '    ';
                        editor.value = 
                            text.substring(0, cursorPos) + 
                            indent + 
                            text.substring(cursorPos);
                        editor.selectionStart = editor.selectionEnd = cursorPos + indent.length;
                    }
                    setScriptContent(editor.value);
                    return;
                }

                // ENTER: Smart line break with format detection
                if (e.key === 'Enter') {
                    const format = detectFormat(currentLine, selectedFormat);
                    
                    if (format === FORMAT_TYPES.CHARACTER) {
                        // After character name, next line should be dialogue
                        e.preventDefault();
                        const dialogueIndent = ' '.repeat(Math.ceil(getIndentation(FORMAT_TYPES.DIALOGUE) * 4));
                        const newContent = 
                            text.substring(0, cursorPos) + 
                            '\n' + dialogueIndent +
                            text.substring(cursorPos);
                        editor.value = newContent;
                        editor.selectionStart = editor.selectionEnd = cursorPos + 1 + dialogueIndent.length;
                        setScriptContent(newContent);
                        setSelectedFormat(FORMAT_TYPES.DIALOGUE);
                        return;
                    }

                    if (format === FORMAT_TYPES.DIALOGUE || format === FORMAT_TYPES.PARENTHETICAL) {
                        // Track that we're in dialogue mode for next format detection
                        setSelectedFormat(format);
                    } else {
                        setSelectedFormat(FORMAT_TYPES.ACTION);
                    }
                }

                // CTRL+SHIFT+S: Open save dialog
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
                    e.preventDefault();
                    setShowSaveModal(true);
                }

                // CTRL+P: Export to PDF
                if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                    e.preventDefault();
                    exportToPDF();
                }
            };

            const handleChange = (e) => {
                setScriptContent(e.target.value);
                setIsDirty(true);
                cursorPositionRef.current = e.target.selectionStart;
                updateAutomationState(e.target.value, e.target.selectionStart);
            };

            const handleCursorMove = (e) => {
                cursorPositionRef.current = e.target.selectionStart;
                updateAutomationState(e.target.value, e.target.selectionStart);
            };

            // ================================================================
            // SCENE NAVIGATION
            // ================================================================

            const handleSceneClick = (lineIndex) => {
                if (editorRef.current) {
                    const lines = scriptContent.split('\n');
                    let charPosition = 0;
                    for (let i = 0; i < lineIndex && i < lines.length; i++) {
                        charPosition += lines[i].length + 1; // +1 for newline
                    }
                    editorRef.current.focus();
                    editorRef.current.setSelectionRange(charPosition, charPosition);
                }
            };

            // ================================================================
            // PDF EXPORT
            // ================================================================

            const exportToPDF = () => {
                const element = document.createElement('div');
                element.className = 'pdf-page';
                
                let htmlContent = `<div style="width: 100%; text-align: center; margin: 0 0 1.6in 0; font-weight: bold; font-size: 16pt; line-height: 1.2;">${escapeHtml(title)}</div>`;
                
                const lines = scriptContent.split('\n');
                let previousFormat = FORMAT_TYPES.ACTION;
                
                lines.forEach(line => {
                    const format = detectFormat(line, previousFormat);
                    const formatted = applyFormatting(line, format);
                    const indent = getIndentation(format);
                    
                    const htmlLine = escapeHtml(formatted) || '&nbsp;';
                    const indentPadding = `${indent}in`;
                    let style = `display:block; width:100%; margin:0; padding-left:${indentPadding}; line-height:1.5; white-space:pre-wrap; box-sizing:border-box;`;
                    
                    switch (format) {
                        case FORMAT_TYPES.SCENE_HEADING:
                            style += ' font-weight: bold; margin-top: 0.3in; margin-bottom: 0.08in;';
                            break;
                        case FORMAT_TYPES.ACTION:
                            style += ' margin-bottom: 0.08in;';
                            break;
                        case FORMAT_TYPES.CHARACTER:
                            style += ' font-weight: bold; margin-top: 0.2in; margin-bottom: 0;';
                            break;
                        case FORMAT_TYPES.DIALOGUE:
                            style += ' margin-bottom: 0;';
                            break;
                        case FORMAT_TYPES.PARENTHETICAL:
                            style += ' margin-bottom: 0;';
                            break;
                        case FORMAT_TYPES.TRANSITION:
                            style += ' font-weight: bold; text-align: right; margin-top: 0.2in; padding-left: 0;';
                            break;
                    }
                    
                    htmlContent += `<div style="${style}">${htmlLine}</div>`;
                    
                    if (format !== FORMAT_TYPES.DIALOGUE && format !== FORMAT_TYPES.PARENTHETICAL) {
                        previousFormat = format;
                    }
                });
                
                element.innerHTML = htmlContent;
                
                const opt = {
                    margin: [0.45, 0.45, 0.45, 0.45],
                    filename: `${title.replace(/[^a-z0-9]/gi, '-').toLowerCase()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
                };
                
                html2pdf().set(opt).from(element).save();
                showToast('PDF exported successfully');
            };

            const escapeHtml = (text) => {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;',
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            };

            // ================================================================
            // UI HELPERS
            // ================================================================

            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            const handleNewScript = () => {
                if (scriptContent.trim() && !confirm('Clear current script? (Auto-saved version will be preserved)')) {
                    return;
                }
                setScriptContent('');
                setTitle('Untitled Script');
                setSelectedFormat(FORMAT_TYPES.ACTION);
                setCharacterDraft('');
                setShowCharacterSuggestions(false);
                setActiveSuggestionIndex(0);
                showToast('New script created');
            };

            const handleAutoFormatClick = () => {
                if (!scriptContent.trim()) {
                    showToast('Nothing to format yet');
                    return;
                }

                const formatted = autoFormatScript(scriptContent);
                setScriptContent(formatted);
                setIsDirty(true);
                showToast('Script auto-formatted');
            };

            const handleSaveTitle = (newTitle) => {
                setTitle(newTitle);
                localStorage.setItem(
                    'filmScriptData',
                    JSON.stringify({ content: scriptContent, title: newTitle })
                );
                showToast(`Saved as "${newTitle}"`);
                setShowSaveModal(false);
            };

            const currentSceneIndex = scenes.length > 0 
                ? scenes.reduce((prev, scene) => {
                    return cursorPositionRef.current >= scene.index ? scene.index : prev;
                }, scenes[0]?.index || 0)
                : 0;

            // ================================================================
            // RENDER
            // ================================================================

            return (
                <div className="glass-shell flex h-screen">
                    {/* Scene Navigator Sidebar */}
                    <SceneNavigator
                        scenes={scenes}
                        onSceneClick={handleSceneClick}
                        currentLineIndex={currentSceneIndex}
                    />

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Header */}
                        <div className="glass-panel glass-sheen px-6 py-4 flex items-center justify-between border-x-0 border-t-0 rounded-none">
                            <div className="flex items-center gap-4">
                                <h1 className="text-2xl font-bold text-slate-50">{title}</h1>
                                <span className="text-xs text-sky-100 px-2 py-1 rounded-full border border-white/15 bg-white/10">
                                    {isDirty ? 'Editing...' : 'Saved'}
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <button
                                    className="button-base button-secondary"
                                    onClick={handleAutoFormatClick}
                                    title="Ctrl+Shift+F"
                                >
                                    Auto Format
                                </button>
                                <button
                                    className="button-base button-secondary"
                                    onClick={() => setShowSaveModal(true)}
                                    title="Ctrl+Shift+S"
                                >
                                    Save As
                                </button>
                                <button
                                    className="button-base button-primary"
                                    onClick={exportToPDF}
                                    title="Ctrl+P"
                                >
                                    Export PDF
                                </button>
                                <button
                                    className="button-base button-danger"
                                    onClick={handleNewScript}
                                >
                                    New
                                </button>
                            </div>
                        </div>

                        {/* Editor Area */}
                        <div className="flex-1 overflow-hidden min-w-0">
                            <div className="glass-panel glass-sheen mx-4 mt-4 rounded-3xl overflow-hidden">
                                <div className="px-4 py-3 border-b border-white/10 flex items-center justify-between gap-4">
                                    <div>
                                        <div className="automation-panel-title border-0 p-0 mb-1">Automation</div>
                                        <div className="text-xs text-sky-100/70">Free helpers for formatting, cleanup, and character memory.</div>
                                    </div>
                                    <div className="automation-actions justify-end">
                                        <button className="automation-action" onClick={handleAutoFormatClick}>
                                            Auto Format Script
                                        </button>
                                        <button
                                            className="automation-action"
                                            onClick={() => {
                                                const editor = editorRef.current;
                                                if (!editor) return;
                                                const cursorPos = editor.selectionStart;
                                                const text = editor.value;
                                                const lineStart = text.lastIndexOf('\n', cursorPos - 1) + 1;
                                                const lineEndIndex = text.indexOf('\n', cursorPos);
                                                const lineEnd = lineEndIndex === -1 ? text.length : lineEndIndex;
                                                const currentLine = text.slice(lineStart, lineEnd);
                                                const currentFormat = detectFormat(currentLine, selectedFormat);

                                                if (currentFormat !== FORMAT_TYPES.CHARACTER) {
                                                    showToast('Place the cursor on a character line first');
                                                    return;
                                                }

                                                const normalized = currentLine.trim().toUpperCase();
                                                const updated = text.slice(0, lineStart) + normalized + text.slice(lineEnd);
                                                editor.value = updated;
                                                setScriptContent(updated);
                                                setIsDirty(true);
                                                showToast('Current character normalized');
                                            }}
                                        >
                                            Normalize Character
                                        </button>
                                    </div>
                                </div>
                                <div className="px-4 py-4 grid gap-4 md:grid-cols-[1fr_260px]">
                                    <div className="rounded-2xl border border-white/10 bg-white/5 p-3">
                                        <div className="text-[11px] uppercase tracking-wider text-sky-100/80 font-bold mb-2">
                                            Automated Cleanup
                                        </div>
                                        <div className="text-xs text-sky-50/70 leading-relaxed">
                                            Trims trailing spaces, collapses extra blank lines, and normalizes character names from the current script memory.
                                        </div>
                                    </div>
                                    <div className="rounded-2xl border border-white/10 bg-white/5 p-3">
                                        <div className="text-[11px] uppercase tracking-wider text-sky-100/80 font-bold mb-2">
                                            Character Memory
                                        </div>
                                        {showCharacterSuggestionsPanel ? (
                                            <div className="rounded-xl border border-white/10 overflow-hidden bg-slate-950/20">
                                                {characterSuggestions.slice(0, 5).map((character, index) => (
                                                    <button
                                                        key={character}
                                                        type="button"
                                                        className={`character-suggestion w-full text-left px-3 py-2 text-sm border-b border-white/5 last:border-b-0 ${
                                                            index === activeSuggestionIndex ? 'bg-sky-300/20 text-sky-50' : 'bg-transparent text-sky-50/80'
                                                        }`}
                                                        onMouseDown={(event) => {
                                                            event.preventDefault();
                                                            selectCharacterSuggestion(character);
                                                        }}
                                                    >
                                                        {character}
                                                    </button>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-xs text-sky-50/70 leading-relaxed">
                                                Remembered character names will appear here while you write.
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            <div className="px-4 pt-4 h-[calc(100%-11rem)]">
                            <textarea
                                ref={editorRef}
                                value={scriptContent}
                                onChange={handleChange}
                                onKeyDown={handleKeyDown}
                                onClick={handleCursorMove}
                                onKeyUp={handleCursorMove}
                                className="editor-textarea glass-panel w-full h-full"
                                placeholder="Start writing your script here...&#10;&#10;Tips:&#10;• Type INT. or EXT. to start a scene heading&#10;• Character names in ALL CAPS&#10;• Press Enter after character to auto-format dialogue&#10;• Use Tab for smart indentation&#10;• Ctrl+P to export PDF&#10;• Ctrl+Shift+S to save with title"
                                spellCheck="false"
                            />
                            </div>
                        </div>

                        {/* Statistics Footer */}
                        <div className="stats-bar glass-panel flex items-center justify-between text-sky-50/80 border-x-0 border-b-0 rounded-none">
                            <div className="flex gap-6">
                                <span>📄 Pages: ~{stats.pages}</span>
                                <span>📍 Scenes: {stats.scenes}</span>
                                <span>👥 Characters: {stats.characters}</span>
                                <span>📝 Lines: {stats.lines}</span>
                            </div>
                            <div className="text-xs text-gray-500">
                                Press Tab or Enter for smart formatting • Ctrl+P to export • Ctrl+Shift+S to save
                            </div>
                        </div>
                    </div>

                    {/* Save Modal */}
                    {showSaveModal && (
                        <div className="modal-overlay" onClick={() => setShowSaveModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-title">Save Script</div>
                                <input
                                    type="text"
                                    className="modal-input"
                                    placeholder="Script Title"
                                    defaultValue={title}
                                    autoFocus
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            handleSaveTitle(e.target.value);
                                        }
                                    }}
                                />
                                <div className="flex gap-3">
                                    <button
                                        className="button-base button-primary flex-1"
                                        onClick={(e) => {
                                            const input = e.target.parentElement.querySelector('input');
                                            handleSaveTitle(input.value);
                                        }}
                                    >
                                        Save
                                    </button>
                                    <button
                                        className="button-base button-secondary flex-1"
                                        onClick={() => setShowSaveModal(false)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && <div className="toast">{toast}</div>}
                </div>
            );
        };

        // ============================================================================
        // RENDER APP
        // ============================================================================

        ReactDOM.createRoot(document.getElementById('root')).render(<ScriptEditor />);
    </script>
</body>
</html>
